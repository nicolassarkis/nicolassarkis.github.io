name: Deploy to GitHub Pages

on:
  # Trigger the workflow every time you push to the `main` branch
  # Using a different branch name? Replace `main` with your branch’s name
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab on GitHub.
  workflow_dispatch:

# Allow this job to clone the repo and create a page deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Inject lastUpdated timestamp
        run: |
          shopt -s globstar
          for file in src/pages/**/*.{astro,md,mdx,ts,js}; do
            if [ -f "$file" ]; then
              if grep -q "const lastUpdated" "$file"; then
                ts=$(git log -1 --pretty="format:%at" -- "$file")
                sed -i -E "s/const lastUpdated = [0-9]+;/const lastUpdated = $ts;/" "$file"
              fi
            fi
          done
      - name: Install, build, and upload your site
        uses: withastro/action@v5

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
